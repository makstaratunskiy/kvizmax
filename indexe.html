<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історичні корабельні катастрофи</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <div id="start-screen" class="screen">
            <!-- Завдання 1 - Наповнення HTML -->
            <a id = "about-btn" href="index.html">Про Квіз⚙️</a>
            <h2>🧨🚢Історичні корабельні катастрофи🚢🧨</h2>
            <button id="start-btn">Початок</button>
        </div>

        <div id="quiz-screen" class="screen hide">
            <!-- Блок з таймером та балами -->
            <div class="header">
                <span id="timer">Time: 10</span>
                <span id="score-display"></span>
            </div>
            <h2 id="question-text">Запитання 1</h2>
            <div id="answers-container">
            </div>
        </div>

        <div id="result-screen" class="screen hide">
            <!-- Блок з результатом -->
            <h2>Квіз завершено!</h2>
            <p class="result-text"></p>
            <button id="restart-btn">Спробувати ще</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
